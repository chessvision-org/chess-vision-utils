version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Baku
    target-branch: main
    labels:
      - dependencies
      - chore
    commit-message:
      prefix: "chore"
      include: scope
    groups:
      # Group all devDependency patches/minors into one PR
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Baku
    labels:
      - dependencies
      - "area: ci"
    commit-message:
      prefix: "ci"
