name: Issue Triage

# Applies needs-triage to every newly opened issue so nothing falls
# through the cracks without a maintainer review.

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label:
    name: Apply needs-triage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage'],
            });
