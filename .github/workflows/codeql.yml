name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "21 9 * * 6"  # weekly on Saturday

permissions:
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Code scanning requires GitHub Advanced Security — available on all public repos.
    if: ${{ !github.event.repository.private }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          build-mode: none

      - uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
