name: PR Labeler

# Labels PRs automatically:
#   1. area/type/dependency labels from changed file paths (actions/labeler)
#   2. type label derived from the Conventional Commit PR title
#   3. breaking change label when the title contains !
#   4. needs-triage on every new PR
#
# Uses pull_request_target so labeling works for fork PRs.
# PR code is never checked out — only the base repo's label config is read.

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: labeler-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  paths:
    name: Label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v6
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

  title:
    name: Label by PR title
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const title = context.payload.pull_request.title || '';
            const match = title.match(/^(\w+)(?:\([^)]*\))?(!?):/);
            if (!match) return;

            const typeMap = {
              feat:     'enhancement',
              fix:      'bug',
              docs:     'documentation',
              perf:     'performance',
              refactor: 'refactor',
              test:     'tests',
              build:    'dependencies',
              ci:       'area: ci',
              chore:    'chore',
              style:    'chore',
              revert:   'bug',
            };

            const toAdd = [];
            const typeLabel = typeMap[match[1].toLowerCase()];
            if (typeLabel) toAdd.push(typeLabel);
            if (match[2] === '!') toAdd.push('breaking change');
            if (toAdd.length === 0) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: toAdd,
            });

  triage:
    name: Mark new PRs as needs-triage
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['needs-triage'],
            });
