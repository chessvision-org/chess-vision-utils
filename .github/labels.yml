# Single source of truth for repository labels.
# Synced to GitHub by .github/workflows/label-sync.yml on every push to main.
# Edit here — never in the GitHub UI.
# Colors mirror the chessvision-org/chess-vision palette.

# ── Type ──────────────────────────────────────────────────────────────────────
- name: bug
  color: "b60205"
  description: Something is broken or producing wrong output

- name: enhancement
  color: "5319e7"
  description: New export, option, or feature request

- name: documentation
  color: "0075ca"
  description: README, CHANGELOG, JSDoc, or examples

- name: performance
  color: "fbca04"
  description: Speed or bundle-size improvement

- name: refactor
  color: "c5def5"
  description: Internal restructure — no behavior change

- name: tests
  color: "006400"
  description: New or updated tests

- name: dependencies
  color: "d4c5f9"
  description: Dependency version updates

- name: chore
  color: "e4e669"
  description: Build, tooling, or CI maintenance

- name: security
  color: "b60205"
  description: Security fix or advisory

- name: breaking change
  color: "b60205"
  description: Requires a semver major bump

# ── Area ──────────────────────────────────────────────────────────────────────
- name: "area: fen"
  color: "59d683"
  description: FEN parsing, validation, board utilities

- name: "area: svg"
  color: "59d683"
  description: SVG diagram generator

- name: "area: board-utils"
  color: "59d683"
  description: Board manipulation helpers (move, flip, material)

- name: "area: colors"
  color: "59d683"
  description: Color utilities and board themes

- name: "area: themes"
  color: "59d683"
  description: Board themes, piece sets, and quality presets

- name: "area: image"
  color: "59d683"
  description: Image dimension reading and physical sizing

- name: "area: history"
  color: "59d683"
  description: History types and utilities

- name: "area: coordinates"
  color: "59d683"
  description: Coordinate math and square utilities

- name: "area: dpi"
  color: "59d683"
  description: DPI encoding for PNG/JPEG

- name: "area: ci"
  color: "59d683"
  description: GitHub Actions, release pipeline

- name: "area: types"
  color: "59d683"
  description: TypeScript types and interfaces

- name: "area: a11y"
  color: "4969c1"
  description: Accessibility — SVG aria labels, screen-reader descriptions

# ── Resolution ────────────────────────────────────────────────────────────────
- name: duplicate
  color: "cfd3d7"
  description: Already reported or requested

- name: wontfix
  color: "000000"
  description: Intentional — will not be changed

- name: invalid
  color: "e4e669"
  description: Cannot reproduce or off-topic

# ── Status ────────────────────────────────────────────────────────────────────
- name: "status: triage"
  color: "d93f0b"
  description: Needs review to confirm validity and reproduction

- name: "status: needs-review"
  color: "d93f0b"
  description: PR ready for maintainer review

- name: "status: in-progress"
  color: "5319e7"
  description: Work in progress — a fix or implementation is underway

- name: "status: blocked"
  color: "b60205"
  description: Cannot proceed — waiting on something else

- name: "status: roadmap"
  color: "006400"
  description: Planned for a future release

- name: "status: discussing"
  color: "0052cc"
  description: Under active discussion — no implementation started yet

- name: "status: waiting-update"
  color: "FBCA04"
  description: Awaiting an update or response from the author

- name: "status: shipping"
  color: "9ed361"
  description: Merged and awaiting the next npm release

- name: "status: decayed"
  color: "e99695"
  description: Closed for inactivity — needs follow-up to reopen

- name: stale
  color: "cccccc"
  description: No activity for 60+ days — will be closed unless updated

# ── Community ─────────────────────────────────────────────────────────────────
- name: "good first issue"
  color: "5319e7"
  description: Suitable for first-time contributors

- name: "help wanted"
  color: "006400"
  description: Community contributions welcome

# ── Priority ──────────────────────────────────────────────────────────────────
- name: "priority: high"
  color: "b60205"
  description: Should be addressed soon

- name: "priority: medium"
  color: "d93f0b"
  description: Normal priority

- name: "priority: low"
  color: "fef2c0"
  description: Nice to have

- name: deprioritized
  color: "e99695"
  description: Deprioritized — lacks detail or ignores the contribution guidelines

# ── Moderation / PR ───────────────────────────────────────────────────────────
- name: spam
  color: "FFE27D"
  description: Low-effort or spammy submission

- name: "DO NOT MERGE!"
  color: "b60205"
  description: Must not be merged yet

- name: "MERGE CONFLICT!"
  color: "b60205"
  description: PR has a merge conflict and needs to be updated
