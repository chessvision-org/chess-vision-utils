name: Feature Request
description: Suggest a new API, option, or export
title: "feat: "
labels: ["enhancement", "needs-triage"]

body:
  - type: markdown
    attributes:
      value: |
        **Before opening:** check [existing requests](../../issues?q=is%3Aissue+label%3Aenhancement) and [discussions](../../discussions).

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The specific limitation you hit today.
      placeholder: |
        There's no way to highlight specific squares in the SVG output.
        I need to mark the last move in my chess tutorial app.
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: What would the call site look like? Code is better than prose.
      render: typescript
      placeholder: |
        generateDiagram({
          fen: '...',
          highlights: [
            { square: 'e2', color: '#ff000033' },
            { square: 'e4', color: '#00ff0033' },
          ],
        });
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried? Why aren't they enough?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, mockups, references to similar libraries, or prior art.

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions — this is not already requested.
          required: true
